name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Next.js Static Site
        env:
          NEXT_PUBLIC_BASE_PATH: /NLP-SQL-Autonomous-Database-Operations-Platform
          NEXT_PUBLIC_API_URL: https://queryflow-api.onrender.com
        run: |
          cd frontend
          npm run build

      - name: Deploy static assets to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/out
          branch: gh-pages
